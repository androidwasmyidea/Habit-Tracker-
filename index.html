<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Performance System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:12px; background:linear-gradient(135deg,#667eea,#764ba2); color:#333; }
h1 { text-align:center; color:white; margin-bottom:5px; }
p { color:#ddd; }
.card { background:white; padding:14px; border-radius:14px; margin-bottom:14px; box-shadow:0 4px 10px rgba(0,0,0,0.15); }
h2 { text-align:center; margin-bottom:10px; }
button { width:100%; padding:10px; font-size:15px; border:none; border-radius:8px; margin-top:6px; background:#eee; }
button:hover { opacity:0.9; }
.done { background:#4CAF50; color:white; }
input, select { width:95%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ccc; display:block; margin-left:auto; margin-right:auto; }
canvas { max-width:100%; }
.small-text { font-size:13px; text-align:center; }
.footer { text-align:center; font-size:12px; color:#ccc; margin-top:20px; }
</style>
</head>
<body><h1>Academic Performance System</h1>
<p id="dayType" class="small-text">Smart Study Mode Active</p>
<p class="small-text">
Focus on weak or less-studied subjects. Mark sessions done for submission separately.
</p><div class="card">
<h2>Habits</h2>
<button onclick="toggle(this)">Morning ✘</button>
<button onclick="toggle(this)">Afternoon ✘</button>
<button onclick="toggle(this)">Night ✘</button>
<button onclick="toggle(this)">Planning ✘</button>
<button onclick="toggle(this)">Logging ✘</button>
</div><div class="card">
<h2>Study Session Log</h2>
<select id="subject" style="margin-bottom:8px;"></select>
<input type="number" id="time" placeholder="Minutes studied" style="margin-bottom:8px;">
<div style="display:flex; align-items:center; justify-content:space-between; width:95%; margin:10px auto 0 auto;">
  <span style="font-size:14px;">Submission / Deadline Work</span>
  <input type="checkbox" id="submission" style="transform:scale(1.3);">
</div>
<button onclick="addSession()" style="background:#667eea; color:white;">Add Session</button>
<ul id="sessionList"></ul>
<h3 id="totalTime">Total Time: 0 min</h3>
<button onclick="resetDay()" style="background:#ff6b6b; color:white;">Reset Today</button>
</div><div class="card">
<h2>Academic Output Metrics</h2>
<input type="number" id="problems" placeholder="Problems">
<input type="number" id="pages" placeholder="Pages">
<input type="number" id="concepts" placeholder="Concepts">
</div><div class="card">
<button onclick="calculateScore()" style="background:#28a745; color:white;">Calculate Performance</button>
<h2 id="score"></h2>
<h3 id="streak"></h3>
<h3 id="quality"></h3>
</div><div class="card">
<h2>Weekly Performance</h2>
<canvas id="chart"></canvas>
<h3 id="avg"></h3>
<h3 id="weak"></h3>
</div><p class="footer">© 2026 Ibtehaj • v1.0</p><script>
const subjects = [
"Physics Theory","Physics Practical","Chemistry Theory","Chemistry Practical",
"Civil Theory","Civil Practical","Mechanical Theory","Mechanical Lab",
"Mechanics Theory","Mechanics Lab","Drawing Sketchbook","Drawing Sheet",
"Maths","English","Workshop Theory","Workshop Practice"
];

let sessions = [];

function loadSubjects(){
  let sel = document.getElementById("subject");
  subjects.forEach(s=>{
    let opt = document.createElement("option");
    opt.value=s; opt.text=s;
    sel.appendChild(opt);
  });
}

function updateTotalTime(){
  let total = sessions.reduce((a,b)=>a+b.time,0);
  document.getElementById("totalTime").innerText = "Total Time: " + total + " min";
}

function addSession(){
  let subj = document.getElementById("subject").value;
  let time = +document.getElementById("time").value;
  let submission = document.getElementById("submission").checked;
  if(!time) return;

  sessions.push({subj,time,submission});
  renderSessions();
  updateTotalTime();
  saveData();
}

function renderSessions(){
  let list = document.getElementById("sessionList");
  list.innerHTML = "";
  sessions.forEach((s,i)=>{
    let tag = s.submission ? "(Submission)" : "";
    let li = document.createElement("li");
    li.innerHTML = `${s.subj} - ${s.time} min ${tag} <button onclick="removeSession(${i})">❌</button>`;
    list.appendChild(li);
  });
}

function removeSession(index){
  sessions.splice(index,1);
  saveData();
  renderSessions();
  updateTotalTime();
}

function resetDay(){
  if(confirm("Reset today's data?")){
    sessions = [];
    localStorage.removeItem("sessions");
    renderSessions();
    updateTotalTime();
  }
}

function toggle(btn){
  if(btn.innerText.includes("✘")){
    btn.innerText = btn.innerText.replace("✘","✔");
    btn.classList.add("done");
  } else {
    btn.innerText = btn.innerText.replace("✔","✘");
    btn.classList.remove("done");
  }
  saveData();
}

function calculateScore(){
  let core = 0;
  document.querySelectorAll(".card button").forEach(btn=>{
    if(btn.innerText.includes("✔")) core++;
  });

  let normalSessions = sessions.filter(s=>!s.submission);

  let totalTime = sessions.reduce((a,b)=>a+b.time,0);
  let subjectScore = normalSessions.length>=2 ? 4 : 0;

  let problems = +document.getElementById("problems").value || 0;
  let pages = +document.getElementById("pages").value || 0;
  let concepts = +document.getElementById("concepts").value || 0;

  let output = (problems>=20 || pages>=10 || concepts>=2)?3:0;
  let total = core + subjectScore + output;

  let targetMet = totalTime >= 180;

  document.getElementById("score").innerText = "Score: "+total+"/12 " + (targetMet?"(Target Met)":"(Below Target)");

  let streak = +localStorage.getItem("streak")||0;
  if(total>=7) streak++; else streak=0;
  localStorage.setItem("streak",streak);

  let quality = total>=9 ? "Strong" : total>=7 ? "Weak" : "Broken";

  document.getElementById("streak").innerText = "Streak: "+streak;
  document.getElementById("quality").innerText = "Streak Quality: "+quality;

  saveScore(total);
  saveData();
}

function saveData(){
  localStorage.setItem("sessions",JSON.stringify(sessions));
}

function loadData(){
  sessions = JSON.parse(localStorage.getItem("sessions"))||[];
  renderSessions();
  updateTotalTime();
}

let chart;
function saveScore(score){
  let history = JSON.parse(localStorage.getItem("scores"))||[];
  let today = new Date().toLocaleDateString();

  history.push({date:today,score});
  if(history.length>7) history.shift();

  localStorage.setItem("scores",JSON.stringify(history));
  renderChart();
}

function renderChart(){
  let history = JSON.parse(localStorage.getItem("scores"))||[];

  let labels = history.map(h=>h.date);
  let data = history.map(h=>h.score);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:'line',
    data:{ labels:labels, datasets:[{data:data}] }
  });

  let avg = data.length? (data.reduce((a,b)=>a+b)/data.length).toFixed(2):0;
  document.getElementById("avg").innerText = "Weekly Avg Score: "+avg;

  let subjectCount = {};
  sessions.filter(s=>!s.submission).forEach(s=>{
    subjectCount[s.subj]=(subjectCount[s.subj]||0)+1;
  });

  let weak = Object.entries(subjectCount)
    .filter(([k,v])=>v<2)
    .map(([k])=>k);

  document.getElementById("weak").innerText = "Weak Subjects: "+ (weak.join(", ")||"None");
}

loadSubjects();
loadData();
renderChart();
</script></body>
</html>
